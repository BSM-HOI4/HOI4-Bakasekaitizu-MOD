#Ideas-説明
JP_OWPP_desc:0 "一部の国民が言い出した船に魂が宿るという思想は、今や国家上層部にまで浸透しムーブメントを引き起こしている。\nそんな中旧式艦を解体しようと閣議に上げた議員はその思想を信じる者たちに襲われ、暗殺されてしまった。\nもはや我々には旧式艦を改装し現用に耐えられるようにする選択肢しか残されていないのだ。\n所で君の推し艦って誰？"
JP_ANBF_desc:0 "彗星が来たあの日、陛下は鬼の形相で陸海軍の長を呼び出し6時間に及ぶ会議を開かれた。そこから帰ってきた各軍の長らは青い顔をしてこう言ったという。「もういがみあうのはやめだ。じゃなけりゃお前らここを出ることになるぞ。」と。"
JP_HL_desc:0 "彗星が来る以前から高い識字率を有していたが、さらに高い識字率を有するようになった。"
JP_MRSS_desc:0 "彗星が来た日。謎の力によって他国の大量の沈没船やスクラップとして売却された船が、東京湾に現れたためそれらの船を改装し現用としているのだ。"
JP_Cf_desc:0 "突然現れた大量の旧式艦は、各地の港湾を圧迫し続けた。\nこの対策として阿笠博士という発明家が開発したのが「艦船圧縮装置」である。\nこれにより10隻の艦船を一隻にまとめることができる。"
JP_OGM_desc:0 "彗星の降った日、青梅をはじめとした日本各地に資源が発生した。"

