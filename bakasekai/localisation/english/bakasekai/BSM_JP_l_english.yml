Japanese_choice_desc:0 "日本国民よ!\n選択の時だ!"
JP_The_Shinto_desc:0 "建国以来2600年間築かれた我々の信仰はもはやとどまることを知らない!"
JP_bakuhu_desc:0 "我ら攘夷志士の勢いは止まることを知らず、日本に影響を及ぼすだろう!"
JP_tate_desc:0 "我々日本人は生存圏をさらに「縦」に伸ばさねばなるまい!"
JP_yoko_desc:0 "我々日本人は生存圏をさらに「横」に伸ばすべきだ!"
JP_democ_desc:0 "我々の選択にもはや選択肢はないに等しい。\n民主主義こそが至高の思想であり最上の統治方法だ。"
JP_abyss_desc:0 "「簒奪者」と言われる組織のシンパがついにこの国を操るようになってしまった・・・。"
