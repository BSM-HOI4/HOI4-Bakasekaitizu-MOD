JP_OWPP_desc:0 "一部の国民が言い出した船に魂が宿るという思想は、今や国家上層部にまで浸透しムーブメントを引き起こしている。\nそんな中旧式艦を解体しようと閣議に上げた議員はその思想を信じる者たちに襲われ、暗殺されてしまった。\nもはや我々には旧式艦を改装しまくり現用に耐えられるようにする選択肢しか残されていないのだ。\n所で君の推し艦って誰？"
JP_ANBF_desc:0 "彗星が来たあの日、陛下は鬼の形相で陸海軍の長を呼び出し6時間に及ぶ会議を開かれた。そこから帰ってきた各軍の長らは青い顔をしてこう言ったという。「もういがみあうのはやめだ。じゃなけりゃお前らの飯は
は粟と稗になるぞ。」と。"
JP_HL_desc:0 "彗星が来る以前から高い識字率を有していたが、さらに高い識字率を有するようになった。"
